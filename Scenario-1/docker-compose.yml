services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: support
      POSTGRES_USER: support
      POSTGRES_PASSWORD: support
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: support
      DB_USER: support
      DB_PASSWORD: support
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
